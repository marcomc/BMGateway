---
- name: Install BMGateway runtime assets
  hosts: bm_gateway
  become: true
  vars:
    bm_gateway_root: /opt/bm-gateway
    bm_gateway_config_dir: /etc/bm-gateway
    bm_gateway_state_dir: /var/lib/bm-gateway
  tasks:
    - name: Install system packages
      ansible.builtin.apt:
        name:
          - bluetooth
          - bluez
          - ca-certificates
          - chromium
          - curl
          - dosfstools
          - git
          - kmod
          - libjpeg-dev
          - make
          - python3
          - python3-dev
          - python3-venv
          - util-linux
          - zlib1g-dev
        state: present
        update_cache: true

    - name: Ensure directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ bm_gateway_root }}"
        - "{{ bm_gateway_config_dir }}"
        - "{{ bm_gateway_state_dir }}"

    - name: Install runtime systemd service
      ansible.builtin.copy:
        src: ../systemd/bm-gateway.service
        dest: /etc/systemd/system/bm-gateway.service
        mode: "0644"

    - name: Install web systemd service
      ansible.builtin.copy:
        src: ../systemd/bm-gateway-web.service
        dest: /etc/systemd/system/bm-gateway-web.service
        mode: "0644"

    - name: Install example config
      ansible.builtin.copy:
        src: ../../python/config/config.toml.example
        dest: "{{ bm_gateway_config_dir }}/config.toml"
        mode: "0644"
        force: false

    - name: Install devices registry
      ansible.builtin.copy:
        src: ../../python/config/devices.toml
        dest: "{{ bm_gateway_config_dir }}/devices.toml"
        mode: "0644"
        force: false

    - name: Reload and enable runtime service
      ansible.builtin.systemd:
        name: bm-gateway.service
        daemon_reload: true
        enabled: true

    - name: Enable web service
      ansible.builtin.systemd:
        name: bm-gateway-web.service
        enabled: true
